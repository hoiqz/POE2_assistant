name: Smoke Tests (Production)

# Run after successful deployment to production
on:
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  FRONTEND_URL: https://poe-2-assistant-ten.vercel.app
  BACKEND_URL: https://poe2assistant-production.up.railway.app

jobs:
  smoke-tests:
    name: Smoke Tests - Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 3. Install dependencies
      - name: Install root dependencies
        run: npm install

      # 4. Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. Check backend health
      - name: Check backend health
        run: |
          echo "Checking backend health at $BACKEND_URL/api/health"
          curl -f $BACKEND_URL/api/health || exit 1
          echo "Backend is healthy ✓"

      # 6. Run smoke tests
      - name: Run smoke tests
        run: npm run test:e2e -- tests/e2e/full-flow.spec.ts --project chromium
        env:
          BASE_URL: ${{ env.FRONTEND_URL }}

      # 7. Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

      # 8. Send Slack notification on failure
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Production Smoke Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Smoke Tests Failed*\n\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # 9. Send Slack notification on success
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Production Smoke Tests Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Smoke Tests Passed* ✅\n\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
